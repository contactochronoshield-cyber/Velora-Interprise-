{% extends "base.html" %}

{% block content %}

<div class="login-container">

<div class="login-card">

<h1>

Registrar Empresa

</h1>

<form method="POST">

<input
name="company"
placeholder="Empresa"
required>

<input
name="email"
type="email"
placeholder="Correo"
required>

<input
name="phone"
placeholder="Teléfono">

<input
name="country"
placeholder="País">

<button>

Registrar

</button>

</form>

</div>

</div>

{% endblock %}
